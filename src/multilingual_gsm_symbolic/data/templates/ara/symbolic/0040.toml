question = "ذهبت سارة إلى شاطئ البحر في عطلة. وأعطاها والداها 15 ريالًا لتشتري ما تشاء. في متجر الهدايا التذكارية، كانت حلوى التافي معروضة للبيع بعرض \"اشترِ 1 رطل بسعر 3 ريال للرطل، واحصل على 1 رطل بخصم 1/2.\" فأخذت 4 أرطال. واشترت أيضًا كيسًا مختلطًا من الأصداف البحرية بسعر 1.5 ريال و4 مغناطيسات بسعر 0.25 ريال لكل منها. كم تبقّى مع سارة من نقود؟"

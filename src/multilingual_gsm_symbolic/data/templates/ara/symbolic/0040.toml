question = "ذهبت سارة إلى شاطئ البحر في عطلة. وأعطاها والداها 15 ريالًا لتشتري ما تشاء. في متجر الهدايا التذكارية، كانت حلوى التافي معروضة للبيع بعرض \"اشترِ 500 غرام بسعر 3 ريال، واحصل على 500 غرام بخصم 1/2.\" فأخذت 2000 غرام. واشترت أيضًا كيسًا مختلطًا من الأصداف البحرية بسعر 1.5 ريال و4 مغناطيسات بسعر 0.25 ريال لكل منها. كم تبقّى مع سارة من نقود؟"
answer = "تكلّف حلوى التافي 3 ريال لكل 500 غرام وتحصل على 500 غرام بخصم 1/2. إذن 1/2 سعر 500 غرام هو 500/500*1/2*3 = 1.5 ريال.\nمعًا، يكلّف ذلك 1.5 + 3 = 4.5 ريال.\nأما الـ1000 غرام المتبقية فلا خصم عليها وتكلّف 6 ريال، فيكون السعر الإجمالي 3 + 1.5 + 6 = <<3 + 1.5 + 6 = 10.5>>10.5 ريال\n4 مغناطيسات بسعر 0.25 ريال لكل منها هي 4*0.25=<<4*0.25=1>>1 ريال\nعند جمع كل مشترياتها، 10.5 + 1.5 + 1 = <<10.5+1.5+1=13>>13 ريال\nكان معها 15 ريال وأنفقت 13 ريال، فبقي معها 15 - 13 = <<15-13=2>>2 ريال\n#### 2\n"

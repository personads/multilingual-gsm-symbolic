answer = "إذا كان 1/5 من إجمالي سعة مستشفى مشغولًا، فهذا يعني أنّ 1/5 * 1000 = <<1000*1/5=200>>200 سرير يستخدمها المرضى.\nويكون عدد ما في مستشفى من سرير غير مشغول، دون حالات دخول جديدة، هو 1000 - 200 = <<1000-200=800>>800 سرير.\nوإذا دخل 50 شخصًا كل يوم، فإنّ إجمالي عدد المرضى في مستشفى بعد أسبوع واحد هو 50 مريضًا/يوم * 7 أيام/أسبوع = 350 مريضًا.\nوبعد 2 أسابيع، يكون إجمالي عدد المرضى الذين دخلوا مستشفى هو 350 مريضًا/أسبوع * 2 أسبوع = <<350*2=700>>700 مريضًا، يستخدم كلٌّ منهم سرير واحدًا.\nوبما أنه كان هناك 800 سرير شاغرًا في مستشفى قبل حالات الدخول الجديدة، فإنّ العدد الإجمالي ينخفض إلى 800 - 700 = <<800-700=100>>100 سرير شاغرًا.\n#### 100\n"

question = "يبيع سامي كعك الزنجبيل وفطيرة تفاح في حملة لجمع التبرعات. في يوم السبت، باع 10 علبة من كعك الزنجبيل و4 علب أقل من فطيرة تفاح مما باعه يوم الأحد. وفي يوم الأحد، باع 5 علب أكثر من كعك الزنجبيل مما باعه يوم السبت و15 علبة من فطيرة تفاح. إذا كان سعر كعك الزنجبيل ريال6 وسعر فطيرة تفاح ريال15، فكم ربح سامي خلال اليومين؟"

question = "تأهّلت مريم للانضمام إلى فريق الجري، فذهبت لشراء بعض المعدّات الرياضية. اشترت القميص بلا أكمام بسعر ريال10، والشورت المخصّص لرياضة الجري بسعر أعلى من سعر القميص بلا أكمام بمقدار ريال5، وزوجًا من أحذية التنس كان سعرها الأصلي ريال48 لكنها كانت معروضة بسعر نصف الثمن. وكان لديها قسيمة خصم بقيمة ريال2 على علبة الجوارب الرياضية التي سعرها ريال8 والتي اشترتها أيضًا. فكم أنفقت على المعدّات الرياضية؟"

question = "يشاهد محمد التلفاز بعد أن ينهي واجباته المنزلية كل ليلة. في يومي الاثنين والثلاثاء، شاهد حلقة مدّتها 1 ساعة من برنامجه المفضّل كل ليلة. وفي يوم الأربعاء، شاهد بضع حلقات من برنامج مدّته 30 دقيقة. وفي يوم الخميس، أنهى واجباته مبكّرًا وشاهد حلقة مدّتها 1 ساعة وبرنامجًا مدّته 30 دقيقة. وفي يوم الجمعة، سُمح له بالسهر، فشاهد اثنان حلقة مدّة كل منها 1 ساعة. إذا شاهد 7 ساعات من التلفاز إجمالًا، فكم حلقة مدّتها 30 دقيقة شاهد يوم الأربعاء؟"
answer = "لنفترض أنّ س هو عدد الحلقات التي شاهدها يوم الأربعاء.\nبعد يوم الاثنين، بقي لديه 7 - 1 = <<7-1=6>>6 ساعة من مشاهدة التلفاز.\nبعد يوم الثلاثاء، بقي لديه 6 - 1 = <<6-1=5>>5 ساعة من مشاهدة التلفاز.\nبعد يوم الخميس، بقي لديه 5 - 1 - 0.5 = 3.5 ساعة من مشاهدة التلفاز.\nبعد يوم الجمعة، بقي لديه 3.5 - 2 = 1.5 ساعة من مشاهدة التلفاز.\nكل حلقة مدّتها 30 دقيقة تساوي 1/2 ساعة.\nوبذلك س = 1.5/0.5 = 3 حلقة.\n#### 3\n"

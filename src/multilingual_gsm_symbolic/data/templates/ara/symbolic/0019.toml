question = "في اختبار مكوّن من 60 سؤالًا، 40% من الأسئلة سهلة، والباقي مقسّم بالتساوي إلى أسئلة متوسطة وصعبة. إذا كانت سارة متأكّدة من حلّ 75% من الأسئلة سهلة، ونصف الأسئلة متوسطة وصعبة بشكل صحيح، فكم نقطة هي متأكّدة من الحصول عليها؟"

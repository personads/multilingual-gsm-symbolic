question = "لدى أحمد كشك أزهار في سوق المزارعين. يبيع ثلاثة أنواع من الأزهار: القطيفة والبطونية والبيغونيا. عادةً ما يبيع القطيفة بسعر 2.74 ريال لكل أصيص، والبطونية بسعر 1.87 ريال لكل أصيص، والبيغونيا بسعر 2.12 ريال لكل أصيص. ليس لدى أحمد فكّة اليوم، لذا قرّر تقريب جميع أسعاره إلى أقرب عدد صحيح. فإذا باع أحمد 12 أصيص من القطيفة و9 أصيص من البطونية و17 أصيص من البيغونيا، فكم سيكسب؟"
answer = "سيقرّب أحمد سعر القطيفة للأعلى من 2.74 ريال إلى 3 ريال، لأن الرقم الذي يلي 2 هو 5 أو أكبر.\nسيقرّب أحمد سعر البطونية للأعلى من 1.87 ريال إلى 2 ريال، لأن الرقم الذي يلي 1 هو 5 أو أكبر.\nسيقرّب أحمد سعر البيغونيا للأسفل من 2.12 ريال إلى 2 ريال، لأن الرقم الذي يلي 2 هو أقل من 5.\nيبيع أحمد 12 من القطيفة*3 ريال = <<12*3=36>>36 ريال\nيبيع أحمد 9 من البطونية*2 ريال = <<9*2=18>>18 ريال\nيبيع أحمد 17 من البيغونيا*2 ريال = <<17*2=34>>34 ريال\nفي المجموع، سيكسب أحمد 36 ريال + 18 ريال + 34 ريال = <<36+18+34=88>>88 ريال\n#### 88\n"

question = "وفقًا لمعلوماتها الغذائية، يحتوي كيس رقائق البطاطس على 250 سعرة حرارية لكل حصّة. إذا كان كيس وزنه 300 غرام يحتوي على 5 حصص، فكم غرام يمكنك أن تأكل إذا كان هدفك اليومي من السعرات الحرارية 2000 وقد استهلكت بالفعل 1800 سعرة حرارية؟"
answer = "إذا كان الهدف الإجمالي من السعرات الحرارية 2000 وقد استهلكت 1800 سعرة حرارية، فإنّه يتبقّى لي 2000-1800 = <<2000-1800=200>>200 سعرة حرارية لأتناولها\nإذا كانت كل حصّة من رقائق البطاطس تحتوي على 250 سعرة حرارية ولم يتبقّ لي سوى 200 سعرة حرارية لأتناولها، فلا يمكنني أن آكل سوى 200/250 من الحصّة = 4/5 من الحصّة\nونعلم أيضًا أنّ كيسًا من رقائق البطاطس وزنه 300 غرام يحتوي على 5 حصص، إذًا كل حصّة فيها 300 غرام/5 = <<300/5=60>>60 غرام\nإذا لم يكن بإمكاني أن آكل سوى 4/5 من الحصّة، فلا يمكنني أن آكل سوى 60 غرام * 4/5 = 48 غرام\n#### 48\n"

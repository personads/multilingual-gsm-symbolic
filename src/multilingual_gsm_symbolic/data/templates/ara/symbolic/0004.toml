question = "يُحضّر خالد الفُشار كوجبة خفيفة. ومع تسخّن المقلاة المملوءة بالحبوب، تبدأ الحبوب في الفرقعة بوتيرة أسرع. تتفرقع 20 حبة في أول 30 ثانية من الطهي، ثم ثلاثة أضعاف هذا العدد في الـ30 ثانية التالية. ترتفع وتيرة الفرقعة إلى أربعة أضعاف الوتيرة الأولية في الـ30 ثانية التالية، لكن في الـ30 ثانية الأخيرة تتباطأ الفرقعة إلى نصف وتيرة الـ30 ثانية السابقة. بعد أن يرفع خالد المقلاة عن النار، يتفرقع رُبع عدد الحبوب التي تفرقعت في الـ30 ثانية الأخيرة بفعل الحرارة المتبقية. فكم قطعة فُشار لدى خالد ليأكلها؟"

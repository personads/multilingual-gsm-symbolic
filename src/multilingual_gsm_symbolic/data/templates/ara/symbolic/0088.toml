question = "تستطيع سارة الجري أربع مرات أسرع من مشيها، لكنها تستطيع القفز بسرعة تساوي نصف سرعة جريها. إذا كانت تقفز بسرعة 3 كيلومتر في الساعة، فكم كيلومترًا تستطيع أن تقطع في ستة ساعات إذا قضت ثُلث الوقت في الجري وثُلثان الوقت في المشي؟"
answer = "إذا كانت سارة تقفز بسرعة تساوي نصف سرعة جريها، فإنها تجري بسرعة 3*2=<<3*2=6>>6 كيلومتر في الساعة.\nوبما أنها تجري بسرعة تساوي أربع مرات سرعة مشيها، فهذا يعني أنها تمشي بسرعة 6/4=1.5 كيلومتر في الساعة.\nإذا قضت ثُلثان الوقت في المشي، فإنها تمشي لمدة 6*2/3=<<6*2/3=4>>4 ساعات.\nوإذا قضت ثُلث الوقت في الجري، فإنها تجري لمدة 6-4=<<6-4=2>>2 ساعات.\nوبذلك تجري لمدة 2 ساعات بسرعة 6 كيلومتر في الساعة، أي 2*6=<<2*6=12>>12 كيلومتر.\nوتمشي لمدة 4 ساعات بسرعة 1.5 كيلومتر في الساعة، أي 4*1.5=<<4*1.5=6>>6 كيلومتر.\nوبذلك تقطع إجمالًا 12+6=<<12+6=18>>18 كيلومتر.\n#### 18\n"

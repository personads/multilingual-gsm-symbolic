question = "في منزل أحمد، يوجد من ذرة ما يساوي مرتين عدد كانولي. ولديه ما مجموعه 40 كانولي في منزله. اشترى أحمد 60 كانولي إضافية من المتجر، واشترى من ذرة عددًا يقل بمقدار 40 عن عدد كانولي. أوجد المجموع الكلي لعدد ذرة وكانولي الموجودة لدى أحمد في المنزل؟"
answer = "قبل شراء أي ذرة وكانولي، كان لدى أحمد من ذرة ما يساوي مرتين عدد كانولي، أي 40 كانولي*2 ذرة/كانولي = <<40*2=80>>80 ذرة\nالمجموع الكلي لعدد ذرة وكانولي الذي كان لدى أحمد سابقًا هو 80 ذرة + 40 كانولي = <<80+40=120>>120 قطعة\nعندما اشترى من ذرة عددًا يقل بمقدار 40 عن كانولي، اشترى 60 ذرة - 40 ذرة = <<60-40=20>>20 ذرة\nوفي المجموع، اشترى 20 ذرة + 60 كانولي = <<20+60=80>>80 قطعة\nبعد عمليات الشراء، أصبح لدى أحمد 120 قطعة + 80 قطعة = <<120+80=200>>200 من ذرة وكانولي مجتمعةً.\n#### 200\n"

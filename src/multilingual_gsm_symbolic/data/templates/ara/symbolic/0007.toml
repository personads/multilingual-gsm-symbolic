question = "يشتري مزارع علفًا لخيوله. يشتري تشكيلة من التِّبن والشوفان والجزر ومكعّبات السكر. وبما أن مكعّبات السكر مكافأة نادرة، فإنه يشتري عددًا قدره اثنان من العلب وزن كل منها 1 رطل للإسطبل بأكمله. ولا يريد من الجزر إلا ما يكفي لإطعام خيوله ما دامت الخضروات طازجة، لذا يشتري عددًا قدره أربعة من الأكياس وزن كل منها 12 رطل. ويُعدّ التِّبن الغذاء الرئيسي لخيوله، لذا يشتري عددًا قدره اثنان وأربعون من الرزم وزن كل منها 75 رطل. ويُعدّ الشوفان مكمّلًا أساسيًا يُضاف إلى التِّبن، لذا يشتري عددًا قدره عشرون من الأكياس وزن كل منها 65 رطل. إذا كانت شاحنة مزرعته تستطيع حمل 2250 رطل في المرة الواحدة، فكم رحلة يحتاجها المزارع لنقل كل العلف؟"
answer = "يشتري المزارع 2*1 = <<2*1=2>>2 رطل من مكعّبات السكر.\nويشتري 4*12 = <<4*12=48>>48 رطل من الجزر.\nويشتري 20*65 = <<20*65=1300>>1300 رطل من الشوفان.\nويشتري 42*75 = <<42*75=3150>>3150 رطل من التِّبن.\nوزن كل العلف هو 2 + 48 + 1300 + 3150 = <<2+48+1300+3150=4500>>4500 رطل.\nوبذلك يحتاج المزارع إلى 4500 / 2250 = <<4500/2250=2>>2 رحلة لنقل كل العلف في شاحنة مزرعته.\n#### 2\n"

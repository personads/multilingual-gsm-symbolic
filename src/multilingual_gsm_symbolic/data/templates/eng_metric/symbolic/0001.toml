question = "A fog bank rolls in from the ocean to cover a city. It takes 10 minutes to cover every 3 kilometers of the city. If the city is 42 kilometers across from the oceanfront to the opposite inland edge, how many minutes will it take for the fog bank to cover the whole city?"

answer = """
The city will be covered in 42/3 = <<42/3=14>>14 intervals of 10 minutes.
Thus, it will take 14 * 10 = <<14*10=140>>140 minutes for the fog to cover the whole city.
#### 140
"""


So, Mr. Tan paid a total of $12,000 + $20,000 + $250,000 = <<12000+20000+250000=282000>>$282,000 for the transfer, brokerage, and loan fees.
Hence, Mr. Tan's net proceeds is $400,000 - $282,000 = <<400000-282000=118000>>$118,000.
#### 118000
"""


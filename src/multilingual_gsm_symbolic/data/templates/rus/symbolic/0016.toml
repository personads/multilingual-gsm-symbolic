question = "Кристиан продаёт медовые пряники и яблочный пирог для благотворительной акции. В субботу он продал 10 коробок медовых пряников и на 4 коробки яблочного пирога меньше, чем в воскресенье. В воскресенье он продал на 5 коробок медовых пряников больше, чем в субботу, и 15 коробок яблочного пирога. Если медовые пряники стоят 6 рублей, а яблочные пироги стоят 15 рублей, сколько Кристиан заработал за два дня?"
answer = "В воскресенье он продал 10 + 5 = <<10+5=15>>15 коробок медовые пряники.\nОбщее количество коробок медовых пряников, которые продал Кристиан, равно 10 + 15 = <<10+15=25>>25.\nКристиан заработал 25*6 рублей = <<25*6=150>>150 рублей на продаже медовых пряников.\nВ субботу он продал 15 - 4 = <<15-4=11>>11 коробок яблочного пирога.\nОбщее количество коробок яблочного пирога, которые продал Кристиан, равно 15 + 11 = <<15+11=26>>26.\nОн заработал 26*15 рублей = <<26*15=390>>390 рублей на продаже яблочного пирога.\nИтак, Кристиан заработал 150 рублей + 390 рублей = <<150+390=540>>540 рублей за два дня.\n#### 540"

question = "Евгения поехала на побережье на каникулы. Родители дали ей 75 рублей, чтобы купить всё, что она захочет. В киоске ириски продавались по акции: «Купи 500 граммов за 20 рублей, получи 500 граммов за 1/2 цены». Она взяла 1100 граммов. Она также купила смешанный пакет с ракушками, который стоил 17 рублей, и 4 магнита по 2 рубля за штуку. Сколько денег осталось у Евгении?"
answer = "Ириски стоят 20 рублей за 500 граммов, и ещё 500 граммов можно получить за 1/2 цены. Значит, 1/2 от цены 500 граммов составляет 500/500*1/2*20 рублей = 10 рублей.\nВместе это стоит 10 рублей + 20 рублей = 30 рублей.\nОставшиеся 100 граммов идут без скидки и стоят 4 рубля, так что общая цена равна 20 рублей + 10 рублей + 4 рубля = <<20 + 10 + 4 = 34>>34 рубля\n4 магнита по 2 рубля за штуку стоят 4*2 рублей=<<4*2=8>>8 рублей\nЕсли сложить все её покупки, 34 рубля + 17 рублей + 8 рублей = <<34+17+8=59>>59 рублей\nУ неё было 75 рублей, и она потратила 59 рублей, значит, у неё осталось 75 рублей - 59 рублей = <<75-59=16>>16 рублей\n#### 16"

answer = "Если занята доля 1/5 от общей вместимости коек, это означает, что 1/5 * 1000 = <<1000*1/5=200>>200 коек заняты пациентами.\nОбщее количество коек в больнице без новых госпитализаций составляет 1000 коек - 200 коек = <<1000-200=800>>800 коек.\nЕсли каждый день госпитализируют 50 человек, то общее количество пациентов в больнице через одну неделю составляет 50 пациентов/день * 7 дней/неделю = 350 пациентов.\nЧерез 2 нед. общее количество госпитализированных в больнице составит 350 пациентов/неделю*2 = <<350*2=700>>700 пациентов, каждому из которых нужна одна койка.\nЕсли до новых госпитализаций в больнице было 800 свободных коек, то их общее количество уменьшится до 800 коек - 700 коек = <<800-700=100>>100 свободных коек.\n#### 100"

question = "Принц Теодор победил 100 противников своим могучим мечом. Принц Артур, использовавший копьё, победил столько противников, сколько составляет три четверти от количества противников, которых победил принц Теодор. С помощью ржавого железного топора принц Вильгельм победил в два раза больше противников, чем принц Артур. Принц Стефан забыл свой меч дома и с помощью пилочки для ногтей победил столько противников, сколько составляет одна пятая от количества противников, которых победил принц Вильгельм. Сколько противников победил принц Стефан?"

question = "Алиса прошла отбор в команду по бегу, поэтому пошла покупать спортивную экипировку. Она купила майку за 10 руб. Затем она купила беговые шорты, которые стоили на 5 руб. дороже, чем майка. Также она купила кроссовки, которые изначально стоили 48 руб., но продавались за 1/2 первоначальной цены. У неё был купон на скидку 2 руб. на упаковку спортивных носков за 8 руб., и она тоже её купила. Сколько она потратила на спортивную экипировку?"

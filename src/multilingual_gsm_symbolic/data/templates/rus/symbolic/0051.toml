question = "У Альберта есть цветочный прилавок на рынке. Он продаёт три вида цветов: тюльпанами, лилиями и подсолнухами. Обычно он продаёт тюльпанами по 18.1 рубля за горшок, лилиями по 12.3 рубля за горшок и подсолнухами по 14.9 рубля за горшок. Сегодня у Альберта нет копеек, поэтому он решил округлять до ближайшего рубля. Если он продаст 12 горшков с тюльпанами, 9 горшков с лилиями и 17 горшков с подсолнухами, сколько он заработает?"
answer = "Альберта округлит цену своих тюльпанами вниз с 18.1 рубля до 18 рублей, так как цифра после 18 меньше 5.\nАльберта округлит цену своих подсолнухами вверх с 14.9 рубля до 15 рублей, так как цифра после 14 равна 5 или больше.\nАльберта продаёт 12 горшков с тюльпанами*18 рублей = <<12*18=216>>216 рублей\nАльберта продаёт 9 горшков с лилиями*12 рублей = <<9*12=108>>108 рублей\nАльберта продаёт 17 горшков с подсолнухами*15 рублей = <<17*15=255>>255 рублей\nВсего Альберта заработает 216 рублей + 108 рублей + 255 рублей = <<216+108+255=579>>579 рублей\n#### 579"

question = "Вадим смотрит телевизор после того, как заканчивает делать домашнее задание. В понедельник и вторник он посмотрел по одному 1-часовому эпизоду своего любимого шоу. В среду он посмотрел несколько эпизодов 30-минутного шоу. В четверг он рано закончил домашнее задание и посмотрел один 1-часовой эпизод и одно 30-минутное шоу. В пятницу ему разрешили не ложиться спать допоздна, поэтому он посмотрел два 1-часовых эпизода. Если всего он смотрел телевизор 7 часов, сколько 30-минутных эпизодов он посмотрел в среду?"
answer = "Пусть E — количество эпизодов, которые он посмотрел в среду.\nПосле понедельник у него осталось 7 - 1 = <<7-1=6>>6 часов просмотра телевизора.\nПосле вторник у него осталось 6 - 1 = <<6-1=5>>5 часов просмотра телевизора.\nПосле четверг у него осталось 5 - 1 - 0.5 = 3.5 часа просмотра телевизора.\nПосле пятницу у него осталось 3.5 - 2 = 1.5 часа просмотра телевизора.\nКаждый 30-минутный эпизод длится 0.5 часа.\nТаким образом, E = 1.5/0.5 = 3 эпизода.\n#### 3"

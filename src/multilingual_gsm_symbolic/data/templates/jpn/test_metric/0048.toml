question = "エミリーは1分間に6匹のエビの殻をむくことができ、10分で30匹のエビを炒めることができます。90匹のエビの殻をむいて炒めるには、全部でどれくらい時間がかかりますか？ エミリーは殻をむくのと炒めるのを同時にはできません。"
answer = "まず、エミリーがエビの殻をむくのにかかる時間を求めます: 90匹のエビ / 1分あたり6匹のエビ = <<90/6=15>>15分\n次に、調理するのに必要なエビの回数を求めます: 90匹のエビ / 1回あたり30匹のエビ = <<90/30=3>>3回\n次に、回数に1回あたりの時間を掛けて、合計の調理時間を求めます: 3回 * 1回あたり10分 = <<3*10=30>>30分\n最後に、殻をむく時間を足して、エミリーが合計で費やす時間を求めます: 30分 + 15分 = <<30+15=45>>45分\n#### 45\n"

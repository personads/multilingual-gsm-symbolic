question = "おばあちゃんは毎日、お気に入りの散歩道を3キロメートル歩きます。その道には、浜辺を2キロメートル歩く区間と、歩道を1キロメートル歩く区間があります。歩道では、おばあちゃんは浜辺の2倍の速さで歩きます。散歩のうち40分を浜辺で過ごすとすると、3キロメートル全体を歩き終えるのに何分かかりますか？"

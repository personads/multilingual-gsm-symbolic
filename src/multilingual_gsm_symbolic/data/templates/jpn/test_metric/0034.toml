question = "タンさんは自宅を$400,000で売却しました。売却価格の3%にあたる名義変更手数料を支払い、さらに売却価格の5%にあたる仲介手数料も支払いました。さらに、その家の残っていたローン残高として$250,000を支払ったとすると、タンさんの家の売却による手取り額はいくらですか？"
answer = "タンさんは名義変更手数料として $400,000*3/100 = <<400000*3/100=12000>>$12,000 を支払いました。\n仲介手数料として $400,000*5/100 = <<400000*5/100=20000>>$20,000 を支払いました。\nしたがって、タンさんが名義変更手数料、仲介手数料、ローン返済として支払った合計は $12,000 + $20,000 + $250,000 = <<12000+20000+250000=282000>>$282,000 です。\nよって、タンさんの手取り額は $400,000 - $282,000 = <<400000-282000=118000>>$118,000 です。\n#### 118000\n"

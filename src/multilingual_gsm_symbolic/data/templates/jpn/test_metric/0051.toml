question = "アーティーはファーマーズマーケットで花の売り場を出しています。彼は3種類の花、マリーゴールド、ペチュニア、ベゴニアを売っています。ふだんは、マリーゴールドを1鉢あたり$2.74、ペチュニアを1鉢あたり$1.87、ベゴニアを1鉢あたり$2.12で売っています。今日はおつりがないので、すべての値段を最も近い1ドルに四捨五入することにしました。アーティーがマリーゴールドを12鉢、ペチュニアを9鉢、ベゴニアを17鉢売ると、売上はいくらになりますか？"

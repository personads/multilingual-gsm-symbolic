question_annotated = "{name,サリー}は休暇で海辺に行きました。両親は、好きなものを何でも買えるように{total,15}ドルくれました。みやげ物店では、タフィーが「{n1,500}グラムを{p1,3}ドルで買うと、さらに{n2,500}グラムが半額」というセール中でした。彼女は{n12,2000}グラムすくい取りました。さらに、貝殻の詰め合わせ1袋を{p2,1.5}ドルで、1個{p3,0.25}ドルのマグネットを{n3,4}個買いました。{name,サリー}の手元にはいくら残っていますか？\n\n#init:\n- name = sample(names_female)\n- $total = range(10, 40, 5)\n- $n1 = range(500, 3000, 500)\n- $n2 = range(500, 3000, 500)\n- $n12 = range(1000, 6000, 500)\n- $n3 = range(4, 12, 4)\n- $p1 = range(1, 10)\n- $p2 = arange(1, 3.5, 0.5)\n- $p3 = arange(0.25, 1.5, 0.25)\n- $discount = sample(fractions)\n\n#conditions:\n- n2 <= n1\n- n12 - n1 - n2 > 0\n- is_int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1 + p2 + n3*p3)\n- p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1 + p2 + n3*p3 < total\n\n#answer: total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)\n"
answer_annotated = "タフィーは{n1}グラムで{p1}ドルで、さらに{n2}グラムを半額で買えます。したがって、{n2}グラム分の値段の{discount}は {n2}/{n1}*{discount}*${p1} = ${(n2/n1)*discount*p1} です。\n合わせると、${(n2/n1)*discount*p1} + ${p1} = ${(n2/n1)*discount*p1 + p1} です。\n残りの{n12 - n1 - n2}グラムには割引がなく、{(n12 - n1 - n2)/n1*p1}ドルかかるので、合計金額は ${p1} + ${n2/n1*discount*p1} + ${(n12 - n1 - n2)/n1*p1} = $<<{p1} + {n2/n1*discount*p1} + {(n12 - n1 - n2)/n1*p1} = {p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}>>{p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}\n1個{p3}ドルのマグネット{n3}個は {n3}*${p3}=$<<{n3}*{p3}={n3*p3}>>{n3*p3}\n買ったもの全部を足すと、${p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1} + ${p2} + ${n3*p3} = $<<{p1+(n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}+{p2}+{n3*p3}={int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}>>{int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}\n{total}ドル持っていて{int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}ドル使ったので、残りは ${total} - ${int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} = $<<{total}-{int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}={total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}>>{total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} です\n#### {total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}\n"

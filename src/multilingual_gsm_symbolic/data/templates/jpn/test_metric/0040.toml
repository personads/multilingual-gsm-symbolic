question = "サリーは休暇で海辺に行きました。両親は、好きなものを何でも買えるように15ドルくれました。みやげ物店では、タフィーが「500グラムを3ドルで買うと、さらに500グラムが半額」というセール中でした。彼女は2000グラムすくい取りました。さらに、貝殻の詰め合わせ1袋を1.5ドルで、1個0.25ドルのマグネットを4個買いました。サリーの手元にはいくら残っていますか？"
answer = "タフィーは500グラムで3ドルで、さらに500グラムを半額で買えます。したがって、500グラム分の値段の1/2は 500/500*1/2*$3 = $1.5 です。\n合わせると、$1.5 + $3 = $4.5 です。\n残りの1000グラムには割引がなく、6ドルかかるので、合計金額は $3 + $1.5 + $6 = $<<3 + 1.5 + 6 = 10.5>>10.5\n1個0.25ドルのマグネット4個は 4*$0.25=$<<4*0.25=1>>1\n買ったもの全部を足すと、$10.5 + $1.5 + $1 = $<<10.5+1.5+1=13>>13\n15ドル持っていて13ドル使ったので、残りは $15 - $13 = $<<15-13=2>>2 です\n#### 2\n"

question = "塔迪斯王子用他威猛的劍殺死了100隻龍，而亞瑟王子使用長矛，殺死的龍數量是塔迪斯王子的四分之三。華特王子用一把生鏽的鐵斧殺死的龍數量是亞瑟王子的兩倍。但布魯斯王子把劍忘在家裡了，只用一把指甲銼就殺死了華特王子五分之一數量的龍。布魯斯王子殺死了多少隻龍？"

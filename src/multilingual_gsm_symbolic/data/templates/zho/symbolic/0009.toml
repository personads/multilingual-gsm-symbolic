question = "當 雅婷 照看她的外甥時，她會拿出各式各樣的玩具給他玩。那袋積木裡有 31 塊積木。那個絨毛玩偶箱裡有 8 個絨毛玩偶。那座套疊環塔上有 9 個彩色套環。雅婷 最近買了一筒彈力球，讓她給外甥的玩具總數增加到 62 個。這筒裡有多少顆彈力球？"

question = "在 柏翰 家裡，玉米的數量是奶油捲的兩倍。他家裡一共有 40 個奶油捲。柏翰 在商店又買了 60 個奶油捲，並且買了比奶油捲數量少 40 個的玉米。求 柏翰 家裡玉米和奶油捲的總數是多少？"
answer = "在買任何玉米和奶油捲之前，柏翰 擁有的玉米數量是奶油捲的兩倍，也就是 40 個奶油捲*2 個玉米/個奶油捲 = <<40*2=80>>80 個玉米\n柏翰 原本擁有的玉米和奶油捲總數是 80 個玉米 + 40 個奶油捲 = <<80+40=120>>120 個\n當他買的玉米比奶油捲少 40 個時，他買了 60 個玉米 - 40 個玉米 = <<60-40=20>>20 個玉米\n總共來說，他買了 20 個玉米 + 60 個奶油捲 = <<20+60=80>>80 個\n購買之後，柏翰 共有 120 個 + 80 個 = <<120+80=200>>200 個玉米和奶油捲。\n#### 200\n"

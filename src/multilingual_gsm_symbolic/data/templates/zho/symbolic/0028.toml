question = "一家醫院有 1000 張病床的容量，其中 1/5 已被占用。由於冠狀病毒疫情爆發，每天有 50 位病人入住醫院。計算 2 週後醫院內總共有多少張未被占用的病床。"
answer = "如果醫院病床總容量的 1/5 已被占用，這表示 1/5 * 1000 = <<1000*1/5=200>>200 張病床有病人使用。\n在沒有新病人入住的情況下，醫院未被占用的病床總數是 1000 張病床 - 200 張病床 = <<1000-200=800>>800 張病床。\n如果每天有 50 人入住，一週後醫院內新增入住的病人總數是 50 位病人/天 * 7 天/週 = 350 位病人。\n2 週後，入住醫院的病人總數是 350 位病人/週 * 2 週 = <<350*2=700>>700 位病人，而每位病人各需要使用一張病床。\n如果在新病人入住前，醫院有 800 張未被占用的病床，則總數會減少為 800 張病床 - 700 張病床 = <<800-700=100>>100 張未被占用的病床。\n#### 100\n"

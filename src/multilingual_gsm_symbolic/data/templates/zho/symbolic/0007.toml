question = "一位農夫正在為他的馬購買飼料。他買了各種乾草、燕麥、紅蘿蔔和方糖。由於方糖是難得的零食，他只為整個馬廄買了兩盒每盒 1 磅的方糖。他只想買足夠的紅蘿蔔，在蔬菜還新鮮時餵馬，所以他買了四袋每袋 12 磅的紅蘿蔔。乾草是他的馬的主食，所以他買了四十二包每包 75 磅的乾草。燕麥是用來補充乾草的主糧，所以他買了二十袋每袋 65 磅的燕麥。如果他的農場卡車一次可以載重 2250 磅，農夫需要跑幾趟才能把所有飼料運走？"

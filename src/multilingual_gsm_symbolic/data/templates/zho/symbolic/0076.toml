question = "俊廷 上週星期一抓到 3 條鮪魚，他抓到的第一條鮪魚重 56 公斤，第二條鮪魚重 46 公斤，剩下的鮪魚重 26 公斤。如果每公斤鮪魚售價為 $0.5，把所有鮪魚賣到市場後，他會賺多少錢？"

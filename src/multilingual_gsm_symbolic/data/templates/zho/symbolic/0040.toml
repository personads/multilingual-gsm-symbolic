question = "莎莉去海邊度假。她的父母給了她 $15，讓她買任何她想要的東西。在紀念品店，太妃糖正在特價：「以每磅 $3 購買 1 磅，另 1 磅可享 1/2 折扣。」她裝了 4 磅。她另外還買了一袋混合貝殼，價格是 $1.5，還買了 4 個磁鐵，每個 $0.25。莎莉還剩下多少錢？"
answer = "莎莉購買 1 磅，每磅 $3，另外 1 磅享有半價優惠。所以，1 磅的半價優惠是 $3*1/2 = $1.5。剩下的 2 磅沒有折扣，費用是 2*$3 = $6，所以總共是 $3+$3/2+$6=$21/2\n4 個磁鐵每個 $0.25，所以 4*0.25=$<<4*0.25=1>>1\n把她所有購買的東西加起來，$21/2+$1.5+$1 = $<<21/2+1.5+1=13>>13\n她原本有 $15，花了 $13，所以她還剩下 $15-$13 = $<<15-13=2>>2\n#### 2\n"

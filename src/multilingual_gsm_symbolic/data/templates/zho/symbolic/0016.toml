answer_annotated = "他在{d2}賣出了 {n1} + {n2} = <<{n1}+{n2}={n1+n2}>>{n1+n2} 盒{food}。\n{name} 賣出的{food}總盒數是 {n1} + {n1+n2} = <<{n1}+{n1+n2}={2*n1+n2}>>{n1+n1+n2}。\n{name} 賣{food}賺了 {n1+n1+n2}*{cur}{cn} = {cur}<<{n1+n1+n2}*{cn}={(n1+n1+n2)*cn}>>{(n1+n1+n2)*cn}。\n他在{d1}賣出了 {m2} - {m1} = <<{m2}-{m1}={m2-m1}>>{m2-m1} 盒{fruit}派。\n{name} 賣出的{fruit}派總盒數是 {m2} + {m2-m1} = <<{m2}+{m2-m1}={2*m2-m1}>>{2*m2-m1}。\n他賣{fruit}派賺了 {2*m2-m1}*{cur}{cm} = {cur}<<{2*m2-m1}*{cm}={(2*m2-m1)*cm}>>{(2*m2-m1)*cm}。\n所以，{name} 兩天一共賺了 {cur}{(n1+n1+n2)*cn} + {cur}{(2*m2-m1)*cm} = {cur}<<{(n1+n1+n2)*cn}+{(2*m2-m1)*cm}={(2*n1+n2)*cn + (2*m2-m1)*cm}>>{(2*n1+n2)*cn + (2*m2-m1)*cm}。\n#### {(2*n1+n2)*cn + (2*m2-m1)*cm}\n"

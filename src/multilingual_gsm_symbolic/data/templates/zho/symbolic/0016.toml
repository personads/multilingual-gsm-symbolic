question = "承恩 正在為募款活動販售薑餅和蘋果派。星期六時，他賣出了 10 盒薑餅，而蘋果派比星期天少賣了 4 盒。星期天時，他賣出的薑餅比星期六多 5 盒，並賣出 15 盒蘋果派。如果薑餅每盒售價 $6，蘋果派每盒售價 $15，承恩 兩天一共賺了多少錢？"
answer = "他在星期天賣出了 10 + 5 = <<10+5=15>>15 盒薑餅。\n承恩 賣出的薑餅總盒數是 10 + 15 = <<10+15=25>>25。\n承恩 賣薑餅賺了 25*$6 = $<<25*6=150>>150。\n他在星期六賣出了 15 - 4 = <<15-4=11>>11 盒蘋果派。\n承恩 賣出的蘋果派總盒數是 15 + 11 = <<15+11=26>>26。\n他賣蘋果派賺了 26*$15 = $<<26*15=390>>390。\n所以，承恩 兩天一共賺了 $150 + $390 = $<<150+390=540>>540。\n#### 540\n"

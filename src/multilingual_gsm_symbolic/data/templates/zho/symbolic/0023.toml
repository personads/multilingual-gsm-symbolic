question = "雅涵 正在為她的 3 個孫子孫女編織冬季衣物。他們是三胞胎，所以尺寸都一樣。她想為他們每人做一頂帽子、一條圍巾、一件毛衣、一副連指手套和一雙襪子。做一頂帽子需要 2 絞毛線，一條圍巾需要 4 絞，一件毛衣需要 12 絞，一副連指手套需要 1 絞，一雙襪子需要 2 絞。她需要買多少絞毛線？"

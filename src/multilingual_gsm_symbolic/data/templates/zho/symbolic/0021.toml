question = "俊傑 每天晚上做完作業後都會看電視。在 星期一 和 星期二，他每晚都看一集自己最喜歡的節目，每集 1 小時。到了 星期三，他看了幾集一個每集 30 分鐘的節目。在 星期四，他提早做完作業，於是看了一集 1 小時的節目和一個 30 分鐘的節目。到了 星期五，他可以晚睡，所以他看了 兩 集每集 1 小時的節目。如果他總共看了 7 小時的電視，那麼他在 星期三 看了幾集 30 分鐘的節目？"
answer = "設 E 為他在 星期三 看的集數。\n在 星期一 之後，他還剩下 7 - 1 = <<7-1=6>>6 小時的電視時間。\n在 星期二 之後，他還剩下 6 - 1 = <<6-1=5>>5 小時的電視時間。\n在 星期四 之後，他還剩下 5 - 1 - 0.5 = 3.5 小時的電視時間。\n在 星期五 之後，他還剩下 3.5 - 2 = 1.5 小時的電視時間。\n每一集 30 分鐘的節目是 1/2 小時。\n因此，E = 1.5/0.5 = 3 集。\n#### 3\n"

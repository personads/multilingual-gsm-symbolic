question = "冠宇 正在爆爆米花當點心。隨著裝著玉米粒的平底鍋加熱，玉米粒開始越爆越快。前 30 秒烹調中有 20 粒爆開，接下來的 30 秒爆了前者的 三 倍。再接下來的 30 秒，玉米粒增加到最初爆裂速度的 四 倍，但在最後 30 秒，爆裂速度減慢為前 30 秒的一半。冠宇 把平底鍋從火上移開後，最後 30 秒烹調中爆開的玉米粒數量裡，還有四分之一會因為餘熱繼續爆開。冠宇 一共有多少顆爆米花可以吃？"

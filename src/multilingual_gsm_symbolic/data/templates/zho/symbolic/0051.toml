question = "冠宇 在農夫市集有一個花攤。他賣三種花：萬壽菊、矮牽牛和秋海棠。他平常賣萬壽菊每盆 $2.74、矮牽牛每盆 $1.87，以及秋海棠每盆 $2.12。冠宇 今天沒有零錢，所以他決定把所有價格四捨五入到最接近的整數美元。如果 冠宇 賣出 12 盆萬壽菊、9 盆矮牽牛和 17 盆秋海棠，他會賺多少錢？"

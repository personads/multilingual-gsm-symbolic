question = "在一份有 60 題的測驗中，40% 的題目是簡單題，其餘的題目平均分成普通題和困難題。如果 欣怡 確定能答對 75% 的簡單題，並且能答對一半的普通題和困難題，那麼她確定能得到多少分？"
answer = "普通題和困難題共占這份測驗的 100% - 40% = 60%。\n簡單題有 60 題*40/100 = <<60*40/100=24>>24 題。\n普通題和困難題總共有 60 題*60/100 = <<60*60/100=36>>36 題。\n如果 欣怡 確定能答對 75% 的簡單題，這表示她確定能得到 24 題*75/100 = <<24*75/100=18>>18 分。\n在普通題和困難題中，她確定能答對其中的一半，所以是 36 題*1/2 = <<36*1/2=18>>18 分。\n因此，她在這份測驗中確定能得到 18 分 + 18 分 = <<18+18=36>>36 分。\n#### 36\n"

question = "婉婷 跑步的速度可以是她走路速度的 四倍，但她跳步的速度是她跑步速度的 一半。如果她跳步的速度是每小時 3 英里，而她在 六 小時中有 三分之一 的時間在跑步、三分之二 的時間在走路，那麼她總共可以走多少英里？"
answer = "如果 婉婷 跳步的速度是她跑步速度的 一半，那麼她跑步的速度就是 3*2=<<3*2=6>>6 英里每小時。\n又因為她跑步的速度是走路速度的 四倍，所以她走路的速度是 6/4=1.5 英里每小時。\n如果有 三分之二 的時間在走路，那麼她走路了 6*2/3=<<6*2/3=4>>4 小時。\n如果有 三分之一 的時間在跑步，那麼她跑步了 6-4=<<6-4=2>>2 小時。\n因此，她以每小時 6 英里的速度跑了 2 小時，也就是 2*6=<<2*6=12>>12 英里。\n她以每小時 1.5 英里的速度走了 4 小時，也就是 4*1.5=<<4*1.5=6>>6 英里。\n所以，她總共走了 12+6=<<12+6=18>>18 英里。\n#### 18"

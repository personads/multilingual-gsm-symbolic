question = "सॅली सुट्टीसाठी समुद्रकिनारी गेली. तिच्या आई-वडिलांनी तिला हवे ते खरेदी करण्यासाठी $15 दिले. स्मृतिचिन्हांच्या दुकानात टॉफीवर अशी सवलत होती: \"500 ग्रॅम $3 ला घ्या, आणि 500 ग्रॅम अर्ध्या किमतीत घ्या.\" तिने 2000 ग्रॅम घेतले. तिने $1.5 ला शंख-शिंपल्यांची एक मिश्र पिशवीही घेतली आणि प्रत्येकी $0.25 किमतीचे 4 मॅग्नेट घेतले. सॅलीकडे किती पैसे उरले?"
answer = "टॉफीची किंमत 500 ग्रॅमसाठी $3 आहे आणि तिला 500 ग्रॅम अर्ध्या किमतीत मिळतात. त्यामुळे 500 ग्रॅमच्या किमतीचे 1/2 म्हणजे 500/500*1/2*$3 = $1.5.\nएकूण, त्याची किंमत $1.5 + $3 = $4.5 होते.\nउरलेल्या 1000 ग्रॅमवर सवलत नाही आणि त्याची किंमत $6 आहे, त्यामुळे एकूण किंमत $3 + $1.5 + $6 = $<<3 + 1.5 + 6 = 10.5>>10.5\nप्रत्येकी $0.25 किमतीचे 4 मॅग्नेट म्हणजे 4*$0.25=$<<4*0.25=1>>1\nतिच्या सर्व खरेदीची बेरीज केल्यावर, $10.5 + $1.5 + $1 = $<<10.5+1.5+1=13>>13\nतिच्याकडे $15 होते आणि तिने $13 खर्च केले, त्यामुळे तिच्याकडे $15 - $13 = $<<15-13=2>>2 उरले\n#### 2\n"

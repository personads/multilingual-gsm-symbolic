question_annotated = "{name,सॅली} सुट्टीसाठी समुद्रकिनारी गेली. तिच्या आई-वडिलांनी तिला हवे ते खरेदी करण्यासाठी ${total,15} दिले. स्मृतिचिन्हांच्या दुकानात टॉफीवर अशी सवलत होती: \"{n1,500} ग्रॅम ${p1,3} ला घ्या, आणि {n2,500} ग्रॅम {discount,अर्ध्या} किमतीत घ्या.\" तिने {n12,2000} ग्रॅम घेतले. तिने ${p2,1.5} ला शंख-शिंपल्यांची एक मिश्र पिशवीही घेतली आणि प्रत्येकी ${p3,0.25} किमतीचे {n3,4} मॅग्नेट घेतले. {name,सॅली}कडे किती पैसे उरले?\n\n#init:\n- name = sample(names_female)\n- $total = range(10, 40, 5)\n- $n1 = range(500, 3000, 500)\n- $n2 = range(500, 3000, 500)\n- $n12 = range(1000, 6000, 500)\n- $n3 = range(4, 12, 4)\n- $p1 = range(1, 10)\n- $p2 = arange(1, 3.5, 0.5)\n- $p3 = arange(0.25, 1.5, 0.25)\n- $discount = sample(fractions)\n\n#conditions:\n- n2 <= n1\n- n12 - n1 - n2 > 0\n- is_int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1 + p2 + n3*p3)\n- p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1 + p2 + n3*p3 < total\n\n#answer: total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)\n"
answer_annotated = "टॉफीची किंमत {n1} ग्रॅमसाठी ${p1} आहे आणि तिला {n2} ग्रॅम अर्ध्या किमतीत मिळतात. त्यामुळे {n2} ग्रॅमच्या किमतीचे {discount} म्हणजे {n2}/{n1}*{discount}*${p1} = ${(n2/n1)*discount*p1}.\nएकूण, त्याची किंमत ${(n2/n1)*discount*p1} + ${p1} = ${(n2/n1)*discount*p1 + p1} होते.\nउरलेल्या {n12 - n1 - n2} ग्रॅमवर सवलत नाही आणि त्याची किंमत ${(n12 - n1 - n2)/n1*p1} आहे, त्यामुळे एकूण किंमत ${p1} + ${n2/n1*discount*p1} + ${(n12 - n1 - n2)/n1*p1} = $<<{p1} + {n2/n1*discount*p1} + {(n12 - n1 - n2)/n1*p1} = {p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}>>{p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}\nप्रत्येकी ${p3} किमतीचे {n3} मॅग्नेट म्हणजे {n3}*{p3}=$<<{n3}*{p3}={n3*p3}>>{n3*p3}\nतिच्या सर्व खरेदीची बेरीज केल्यावर, ${p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1} + ${p2} + ${n3*p3} = $<<{p1+(n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}+{p2}+{n3*p3}={int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}>>{int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}\nतिच्याकडे ${total} होते आणि तिने ${int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)} खर्च केले, त्यामुळे तिच्याकडे ${total} - ${int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} = $<<{total}-{int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}={total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}>>{total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} उरले\n#### {total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}\n"

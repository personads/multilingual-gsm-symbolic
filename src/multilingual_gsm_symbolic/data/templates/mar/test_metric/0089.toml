question = "James 5 PM ते 9 PM पर्यंत घोडागाडी भाड्याने घेतो. त्याला 1 तास मोफत मिळतो. पहिल्या पैसे द्यायच्या तासासाठी $15 लागतात, आणि त्यानंतरच्या प्रत्येक पैसे द्यायच्या तासासाठी पहिल्या पैसे d्यायच्या तासाच्या twice खर्च येतो. त्याने किती पैसे दिले?"

question = "टौला बेकरीमध्ये गेली आणि तिने विविध प्रकारचे पेस्ट्री पदार्थ विकत घेतले. तिने 3 डझन डोनट्स घेतले ज्यांची किंमत प्रति डझन $68 होती, 2 डझन मिनी कपकेक्स घेतले ज्यांची किंमत प्रति डझन $80 होती, आणि 6 डझन मिनी चीजकेक्स घेतले ज्यांची किंमत प्रति डझन $55 होती. एकूण खर्च किती झाला?"

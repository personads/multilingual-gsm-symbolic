question = "Sunny निधी संकलनासाठी जिंजरब्रेड आणि सफरचंद पाय विकत आहे. शनिवारी, त्याने जिंजरब्रेडच्या 10 पेट्या आणि रविवारीपेक्षा सफरचंद पायच्या 4 ने कमी पेट्या विकल्या. रविवारी, त्याने शनिवारीपेक्षा जिंजरब्रेडच्या 5 ने जास्त पेट्या आणि सफरचंद पायच्या 15 पेट्या विकल्या. जर जिंजरब्रेडची किंमत $6 आणि सफरचंद पायची किंमत $15 असेल, तर Sunny ने दोन दिवसांत किती कमाई केली?"
answer = "त्याने रविवारी जिंजरब्रेडच्या 10 + 5 = <<10+5=15>>15 पेट्या विकल्या.\nSunny ने विकलेल्या जिंजरब्रेडच्या पेट्यांची एकूण संख्या 10 + 15 = <<10+15=25>>25 आहे.\nजिंजरब्रेड विकून Sunny ने 25*$6 = $<<25*6=150>>150 कमावले.\nत्याने शनिवारी सफरचंद पायच्या 15 - 4 = <<15-4=11>>11 पेट्या विकल्या.\nSunny ने विकलेल्या सफरचंद पायच्या पेट्यांची एकूण संख्या 15 + 11 = <<15+11=26>>26 आहे.\nसफरचंद पाय विकून त्याने 26*$15 = $<<26*15=390>>390 कमावले.\nम्हणून, Sunny ने दोन दिवसांत $150 + $390 = $<<150+390=540>>540 कमावले.\n#### 540\n"

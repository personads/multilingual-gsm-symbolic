question = "श्री. टॅन यांनी त्यांचे घर $400,000 ला विकले. त्यांनी विक्री किमतीच्या 3% इतकी हस्तांतरण शुल्के भरली आणि विक्री किमतीच्या 5% इतके दलाली शुल्कही भरले. जर त्यांनी घराच्या उर्वरित कर्जरकमेपोटी $250,000 देखील भरले, तर घर विकल्यावर श्री. टॅन यांना निव्वळ किती रक्कम मिळाली?"

question = "त्याच्या पोषणमाहितीनुसार, चिप्सच्या एका पिशवीत प्रत्येक सर्व्हिंगमागे 250 कॅलरी असतात. जर 300 ग्रॅमच्या पिशवीत 5 सर्व्हिंग असतील, तर तुमचे रोजचे कॅलरीचे लक्ष्य 2000 आहे आणि तुम्ही आधीच 1800 कॅलरी घेतल्या असतील, तर तुम्ही किती ग्रॅम खाऊ शकता?"
answer = "जर एकूण कॅलरीचे लक्ष्य 2000 असेल आणि मी 1800 कॅलरी घेतल्या असतील, तर माझ्याकडे खाण्यासाठी 2000-1800 = <<2000-1800=200>>200 कॅलरी उरतात\nजर चिप्सच्या प्रत्येक सर्व्हिंगमध्ये 250 कॅलरी असतील आणि माझ्याकडे खाण्यासाठी फक्त 200 कॅलरी उरल्या असतील, तर मी फक्त 200/250 सर्व्हिंग = 4/5 सर्व्हिंग खाऊ शकतो\nआपल्याला हेही माहीत आहे की 300 ग्रॅमच्या चिप्सच्या पिशवीत 5 सर्व्हिंग असतात, त्यामुळे प्रत्येक सर्व्हिंगमध्ये 300 ग्रॅम/5 = <<300/5=60>>60 ग्रॅम असतात\nजर मी फक्त 4/5 सर्व्हिंग खाऊ शकत असेन, तर मी फक्त 60 ग्रॅम * 4/5 = 48 ग्रॅम खाऊ शकतो\n#### 48\n"

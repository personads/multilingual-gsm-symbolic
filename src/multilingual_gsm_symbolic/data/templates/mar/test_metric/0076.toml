question = "डिअँड्रेने गेल्या सोमवारी 3 ट्यूना मासे पकडले, त्याने पकडलेल्या पहिल्या ट्यूना माशाचे वजन 56 किलोग्रॅम आहे, दुसऱ्या ट्यूना माशाचे वजन 46 किलोग्रॅम आहे, आणि उरलेल्या ट्यूना माशाचे वजन 26 किलोग्रॅम आहे. जर ट्यूना माशाच्या एका किलोग्रॅमची किंमत $0.5 असेल, तर सर्व ट्यूना मासे बाजारात विकल्यानंतर तो किती कमावेल?"
answer = "डिअँड्रे पहिल्या ट्यूना माशापासून 56*$0.5 = $<<56*0.5=28>>28 कमावेल.\nतो दुसऱ्या ट्यूना माशासाठी 46*$0.5 = $<<46*0.5=23>>23 कमावेल.\nउरलेले ट्यूना मासे 3-2 = <<3-2=1>>1 आहेत. तो त्यापैकी प्रत्येकापासून 26*$0.5 = $<<26*0.5=13>>13 कमावेल. त्यामुळे तो 1 * 13 = <<1*13>>=13 कमावेल.\nम्हणून, सर्व ट्यूना मासे विकून तो एकूण $28 + $23 + $13= $<<28+23+13=64>>64 कमावेल.\n#### 64\n"

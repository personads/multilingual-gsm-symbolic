question = "अॅलिसनला धावण्याच्या संघात जागा मिळाली, म्हणून ती काही क्रीडा साहित्य खरेदी करण्यासाठी गेली. तिने $10 ला एक टँक टॉप विकत घेतला, टँक टॉपच्या किमतीपेक्षा $5 जास्त किंमतीची एक धावण्याची शॉर्ट्सची जोडी विकत घेतली, आणि मूळ किंमत $48 असलेले पण अर्ध्या किमतीत विक्रीवर असलेले टेनिस शूजची एक जोडी विकत घेतली. तिने विकत घेतलेल्या $8 किमतीच्या क्रीडा मोज्यांच्या पॅकेटवर तिच्याकडे $2 ची सवलतीची कूपनही होती. तिने क्रीडा साहित्यावर एकूण किती खर्च केला?"

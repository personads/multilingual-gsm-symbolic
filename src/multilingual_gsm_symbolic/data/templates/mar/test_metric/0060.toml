question = "वॉटसन दररोज 10 तासांची पाळी काम करतो, आठवड्यात पाच दिवस. तो तासाला $10 कमावतो आणि कंपनीची कामगिरी चांगली झाली तर त्याला दर आठवड्याला $300 बोनस मिळतो. संपूर्ण महिनाभर कंपनीची कामगिरी खूपच चांगली झाली असेल, तर एप्रिलमध्ये वॉटसनने किती पैसे कमावले?"
answer = "एका दिवशी, वॉटसन 10 * 10 = $<<10*10=100>>100 कमावतो\nजर तो आठवड्यात पाच दिवस काम करत असेल, तर संपूर्ण महिन्यातील एकूण दिवसांची संख्या 5*4=<<5*4=20>>20 दिवस आहे.\nतो दररोज $100 कमावतो, त्यामुळे संपूर्ण महिन्याची एकूण रक्कम 20 * 100= $<<20*100=2000>>2000 आहे.\nएप्रिलमधील सर्व आठवड्यांत कंपनीची कामगिरी चांगली झाली म्हणून त्याला 300 * 4 = $<<300*4=1200>>1200 बोनसही मिळाला.\nएप्रिलच्या शेवटी, त्याने 2000 + 1200 = $<<2000+1200=3200>>3200 कमावले.\n#### 3200\n"

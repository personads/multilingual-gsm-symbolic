answer = "रुग्णालयातील खाटांच्या एकूण क्षमतेपैकी 1/5 भाग व्यापलेला असल्यास, याचा अर्थ 1/5 * 1000 = <<1000*1/5=200>>200 खाटांवर रुग्ण आहेत.\nनवीन दाखल होणारे रुग्ण नसतील तर रुग्णालयातील एकूण रिकाम्या खाटांची संख्या 1000 खाटा - 200 खाटा = <<1000-200=800>>800 खाटा आहे.\nजर दररोज 50 लोक दाखल होत असतील, तर एका आठवड्यानंतर रुग्णालयातील एकूण रुग्णसंख्या 50 रुग्ण/दिवस * 7 दिवस/आठवडा = 350 रुग्ण होईल.\n2 आठवड्यांनंतर, रुग्णालयात दाखल झालेल्या रुग्णांची एकूण संख्या 350 रुग्ण/आठवडा * 2 आठवडे = <<350*2=700>>700 रुग्ण असेल, आणि प्रत्येकजण एक खाट वापरेल.\nनवीन दाखल होण्यापूर्वी रुग्णालयात 800 रिकाम्या खाटा असतील, तर एकूण संख्या 800 खाटा - 700 खाटा = <<800-700=100>>100 रिकाम्या खाटा इतकी उरेल.\n#### 100\n"

question = "आजी तिच्या आवडत्या चालण्याच्या मार्गावर दररोज 3 किलोमीटर चालते, ज्यामध्ये समुद्रकिनाऱ्यावर 2 किलोमीटर चालणे आणि पदपथावर 1 किलोमीटर चालणे समाविष्ट आहे. पदपथावर, आजी समुद्रकिनाऱ्यावरील वेगाच्या दुप्पट वेगाने चालते. जर तिच्या चालण्यातील 40 मिनिटे समुद्रकिनाऱ्यावर जात असतील, तर संपूर्ण 3-किलोमीटर चाल पूर्ण करण्यासाठी तिला एकूण किती मिनिटे लागतात?"
answer = "समुद्रकिनाऱ्यावर, आजी 40 मिनिटांत 2 किलोमीटर या वेगाने चालते, म्हणजे 2/40 = 1/20 किलोमीटर प्रति मिनिट.\nपदपथावर, ती वाळूवर चालते त्याच्या दुप्पट वेगाने चालते, म्हणजे 2*1/20 = 0.1 किलोमीटर प्रति मिनिट.\nपदपथावर 1 किलोमीटर चालण्यासाठी तिला 1/0.1 = <<1/0.1=10>>10 मिनिटे लागतात.\nम्हणून, एकूण आजीला तिचा आवडता मार्ग चालण्यासाठी 40+10 = <<40+10=50>>50 मिनिटे लागतात.\n#### 50\n"

answer = "औसत और कठिन प्रश्न मिलाकर प्रश्नोत्तरी का 100% - 40% = 60% भाग बनाते हैं।\nआसान प्रश्नों की संख्या 60 प्रश्न*40/100 = <<60*40/100=24>>24 है।\nऔसत और कठिन प्रश्नों की कुल संख्या 60 प्रश्न*60/100 = <<60*60/100=36>>36 है।\nयदि Aries को आसान प्रश्नों में से 75% सही आने का पूरा भरोसा है, तो इसका मतलब है कि उसे 24 प्रश्न*75/100 = <<24*75/100=18>>18 अंक पक्के मिलेंगे।\nऔसत और कठिन प्रश्नों में से, उसे आधे सही आने का भरोसा है, इसलिए यह 36 प्रश्न*1/2 = <<36*1/2=18>>18 अंक हुए।\nअतः, उसे अपनी प्रश्नोत्तरी में 18 अंक + 18 अंक = <<18+18=36>>36 अंक पक्के मिलेंगे।\n#### 36\n"

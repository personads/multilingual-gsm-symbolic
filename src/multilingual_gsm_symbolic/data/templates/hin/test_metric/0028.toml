question = "एक अस्पताल में 1000 बिस्तरों की क्षमता है, जिनमें से 1/5 भरे हुए हैं। कोरोनावायरस प्रकोप के कारण, हर दिन 50 मरीज अस्पताल में भर्ती किए जाते हैं। 2 सप्ताह बाद अस्पताल में खाली बिस्तरों की कुल संख्या ज्ञात कीजिए।"
answer = "यदि अस्पताल के बिस्तरों की कुल क्षमता का 1/5 भाग भरा हुआ है, तो इसका मतलब है कि 1/5 * 1000 = <<1000*1/5=200>>200 बिस्तरों पर मरीज हैं।\nनई भर्तियों के बिना अस्पताल में बिस्तरों की कुल खाली संख्या 1000 बिस्तर - 200 बिस्तर = <<1000-200=800>>800 बिस्तर है।\nयदि हर दिन 50 लोगों को भर्ती किया जाता है, तो एक सप्ताह के बाद अस्पताल में भर्ती मरीजों की कुल संख्या 50 मरीज/दिन * 7 दिन/सप्ताह = 350 मरीज है।\n2 सप्ताह बाद, अस्पताल में भर्ती किए गए मरीजों की कुल संख्या 350 मरीज/सप्ताह * 2 सप्ताह = <<350*2=700>>700 मरीज है, और प्रत्येक को एक बिस्तर चाहिए।\nयदि नई भर्तियों से पहले अस्पताल में 800 खाली बिस्तर थे, तो कुल संख्या घटकर 800 बिस्तर - 700 बिस्तर = <<800-700=100>>100 खाली बिस्तर रह जाती है।\n#### 100\n"

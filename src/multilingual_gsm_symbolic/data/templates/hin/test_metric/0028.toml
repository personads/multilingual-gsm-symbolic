answer_annotated = "यदि {facility} के {item}ों की कुल क्षमता का {frac} भाग भरा हुआ है, तो इसका मतलब है कि {frac} * {total} = <<{total}*{frac}={int(total*frac)}>>{int(total*frac)} {item}ों पर मरीज हैं।\nनई भर्तियों के बिना {facility} में {item}ों की कुल खाली संख्या {total} {item} - {int(total*frac)} {item} = <<{total}-{int(total*frac)}={total-int(total*frac)}>>{total-int(total*frac)} {item} है।\nयदि हर दिन {daily} लोगों को भर्ती किया जाता है, तो एक सप्ताह के बाद {facility} में भर्ती मरीजों की कुल संख्या {daily} मरीज/दिन * 7 दिन/सप्ताह = {daily*7} मरीज है।\n{period} सप्ताह बाद, {facility} में भर्ती किए गए मरीजों की कुल संख्या {daily*7} मरीज/सप्ताह * {period} सप्ताह = <<{daily*7}*{period}={daily*period*7}>>{daily*period*7} मरीज है, और प्रत्येक को एक {item} चाहिए।\nयदि नई भर्तियों से पहले {facility} में {total-int(total*frac)} खाली {item} थे, तो कुल संख्या घटकर {total-int(total*frac)} {item} - {daily*period*7} {item} = <<{total-int(total*frac)}-{daily*period*7}={total - (total * frac + daily * period * 7)}>>{total - (total * frac + daily * period * 7)} खाली {item} रह जाती है।\n#### {total - (total * frac + daily * period * 7)}\n"

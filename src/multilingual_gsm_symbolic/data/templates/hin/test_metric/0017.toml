question = "दादी हर दिन अपने पसंदीदा पैदल चलने वाले रास्ते पर 3 किलोमीटर चलती हैं, जिसमें समुद्र तट पर 2 किलोमीटर चलना और फुटपाथ पर 1 किलोमीटर चलना शामिल है। फुटपाथ पर, दादी समुद्र तट की तुलना में दोगुनी गति से चलती हैं। यदि उनकी सैर के 40 मिनट समुद्र तट पर बितते हैं, तो पूरे 3-किलोमीटर के रास्ते को पूरा करने में उन्हें कुल कितने मिनट लगते हैं?"
answer = "समुद्र तट पर, दादी 40 मिनट में 2 किलोमीटर की दर से चलती हैं, अर्थात 2/40 = 1/20 किलोमीटर प्रति मिनट।\nफुटपाथ पर, वह रेत पर चलने की तुलना में दोगुनी गति से चलती हैं, अर्थात 2*1/20 = 0.1 किलोमीटर प्रति मिनट।\nफुटपाथ पर 1 किलोमीटर चलने में उन्हें 1/0.1 = <<1/0.1=10>>10 मिनट लगते हैं।\nअतः, कुल मिलाकर, दादी को अपना पसंदीदा रास्ता चलने में 40+10 = <<40+10=50>>50 मिनट लगते हैं।\n#### 50\n"

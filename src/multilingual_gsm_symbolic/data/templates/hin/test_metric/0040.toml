question = "{name,Sally} छुट्टियाँ मनाने समुद्र तट पर गई। उसके माता-पिता ने उसे अपनी मनचाही चीज़ें खरीदने के लिए ${total,15} दिए। स्मृति-चिह्नों की दुकान पर टॉफ़ी पर यह ऑफ़र था: \"{n1,500} gram ${p1,3} में खरीदें, {n2,500} gram {discount,1/2} कीमत पर पाएं।\" उसने {n12,2000} gram ले ली। उसने ${p2,1.5} में सीपियों का एक मिला-जुला थैला भी खरीदा और {n3,4} चुंबक खरीदे, जिनमें से हर एक की कीमत ${p3,0.25} थी। {name,Sally} के पास कितने पैसे बचते हैं?"
answer = "टॉफ़ी की कीमत {n1} gram के लिए ${p1} है और उसे {n2} gram {discount} कीमत पर मिलते हैं। इसलिए {n2} gram की कीमत का {discount} है {n2}/{n1}*{discount}*${p1} = ${(n2/n1)*discount*p1}.\nकुल मिलाकर, इसकी कीमत ${(n2/n1)*discount*p1} + ${p1} = ${(n2/n1)*discount*p1 + p1} होती है।\nबचे हुए {n12 - n1 - n2} gram पर कोई छूट नहीं है और उसकी कीमत ${(n12 - n1 - n2)/n1*p1} है, इसलिए कुल कीमत ${p1} + ${n2/n1*discount*p1} + ${(n12 - n1 - n2)/n1*p1} = $<<{p1} + {n2/n1*discount*p1} + {(n12 - n1 - n2)/n1*p1} = {p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}>>{p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}\n${p3} प्रति चुंबक की दर से {n3} चुंबकों की कीमत {n3}*{p3}=$<<{n3}*{p3}={n3*p3}>>{n3*p3} है\nजब उसकी सभी खरीदों को जोड़ा जाता है, ${p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1} + ${p2} + ${n3*p3} = $<<{p1+(n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1}+{p2}+{n3*p3}={int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}>>{int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)}\nउसके पास ${total} थे और उसने ${int((p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1)+p2+n3*p3)} खर्च किए, इसलिए उसके पास ${total} - ${int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} = $<<{total}-{int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}={total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}>>{total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)} बचते हैं\n#### {total-int(p1 + (n2/n1)*discount*p1 + (n12 - n1 - n2)/n1*p1+p2+n3*p3)}\n"

question = "वॉटसन हर दिन 10 घंटे की शिफ्ट में काम करता है, सप्ताह में पाँच दिन। वह प्रति घंटा $10 कमाता है और अगर कंपनी अच्छा प्रदर्शन करती है तो उसे हर सप्ताह $300 का बोनस मिलता है। अगर पूरे महीने कंपनी ने बहुत अच्छा प्रदर्शन किया, तो अप्रैल में वॉटसन ने कुल कितने पैसे कमाए?"

question = "श्री टैन ने अपना घर $400,000 में बेचा। उन्होंने हस्तांतरण शुल्क चुकाया, जो बिक्री मूल्य का 3% है, और साथ ही 5% का दलाली शुल्क भी चुकाया। यदि उन्होंने घर की शेष ऋण राशि के लिए $250,000 भी चुकाए, तो घर बेचने से श्री टैन की शुद्ध प्राप्ति कितनी है?"

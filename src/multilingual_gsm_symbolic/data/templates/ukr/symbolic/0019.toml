question = "У вікторині з 60 запитань 40% запитань є легкими, а решта порівну поділена на запитання середньої складності та складні запитання. Якщо Альма впевнена, що правильно відповість на 75% легких запитань і на половину запитань середньої складності та складних запитань, скільки балів вона точно отримає?"
answer = "Запитання середньої складності та складні запитання становлять 100% - 40% = 60% вікторини.\nЄ 60 запитань*40/100 = <<60*40/100=24>>24 легких запитання.\nУсього є 60 запитань*60/100 = <<60*60/100=36>>36 запитань середньої складності та складних запитань.\nЯкщо Альма впевнена, що правильно відповість на 75% легких запитань, це означає, що вона точно отримає 24 запитання*75/100 = <<24*75/100=18>>18 балів.\nІз запитань середньої складності та складних запитань вона точно правильно відповість на половину, тобто це 36 запитань*1/2 = <<36*1/2=18>>18 балів.\nОтже, вона точно отримає 18 балів + 18 балів = <<18+18=36>>36 балів у своїй вікторині.\n#### 36\n"

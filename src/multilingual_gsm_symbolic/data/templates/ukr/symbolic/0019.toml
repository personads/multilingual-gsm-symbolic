answer_annotated = "Запитання {s2} та {s3} запитання становлять 100% - {p1}% = {100-p1}% вікторини.\nЄ {n} запитань*{p1}/100 = <<{n}*{p1}/100={int(n * (p1/100))}>>{int(n * (p1/100))} {s1} запитання.\nУсього є {n} запитань*{100-p1}/100 = <<{n}*{100-p1}/100={int(n*(1-(p1/100)))}>>{int(n*(1-(p1/100)))} запитань {s2} та {s3} запитань.\nЯкщо {name} впевнена, що правильно відповість на {r1}% {s1} запитань, це означає, що вона точно отримає {int(n * (p1/100))} запитання*{r1}/100 = <<{int(n * (p1/100))}*{r1}/100={int(n * (p1/100) * (r1/100))}>>{int(n * (p1/100) * (r1/100))} балів.\nІз запитань {s2} та {s3} запитань вона точно правильно відповість на {frac_txt}, тобто це {int(n*(1-(p1/100)))} запитань*{frac_val} = <<{int(n*(1-(p1/100)))}*{frac_val}={ensure_int(n*(1-(p1/100))*frac_val)}>>{ensure_int(n*(1-(p1/100))*frac_val)} балів.\nОтже, вона точно отримає {int(n * (p1/100) * (r1/100))} балів + {ensure_int(n*(1-(p1/100))*frac_val)} балів = <<{int(n * (p1/100) * (r1/100))}+{ensure_int(n*(1-(p1/100))*frac_val)}={ensure_int(n * (p1/100) * (r1/100)) + ensure_int(n*(1-(p1/100))*frac_val)}>>{ensure_int(n * (p1/100) * (r1/100)) + ensure_int(n*(1-(p1/100))*frac_val)} балів у своїй вікторині.\n#### {ensure_int(n * (p1/100) * (r1/100)) + ensure_int(n*(1-(p1/100))*frac_val)}\n"

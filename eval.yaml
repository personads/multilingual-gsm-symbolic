name: Multilingual GSM-Symbolic
description: >
  Multilingual symbolic math benchmark derived from GSM8K. Evaluating on both the
  original concrete problems and symbolically-generated variants lets you measure
  how much a model relies on memorisation vs. genuine arithmetic reasoning.
evaluation_framework: inspect-ai

tasks:
  - id: original_eng
    config: eng
    split: original

    field_spec:
      input: question
      target: target
      metadata:
        - answer
        - language
        - source_id

    solvers:
      - name: prompt_template
        args:
          template: "Solve the following math problem step by step. End your response with a line containing only the numeric answer prefixed by '####', for example: '#### 42'.\n\n{prompt}"
      - name: generate

    scorers:
      - name: pattern
        args:
          pattern: '####\s*(.+)'

  - id: synthetic_eng
    config: eng
    split: synthetic

    field_spec:
      input: question
      target: target
      metadata:
        - answer
        - language
        - source_id

    solvers:
      - name: prompt_template
        args:
          template: "Solve the following math problem step by step. End your response with a line containing only the numeric answer prefixed by '####', for example: '#### 42'.\n\n{prompt}"
      - name: generate

    scorers:
      - name: pattern
        args:
          pattern: '####\s*(.+)'

  - id: original_dan
    config: dan
    split: original

    field_spec:
      input: question
      target: target
      metadata:
        - answer
        - language
        - source_id

    solvers:
      - name: prompt_template
        args:
          template: "Løs følgende matematikproblem trin for trin. Afslut dit svar med en linje der kun indeholder det numeriske svar foranstillet af '####', for eksempel: '#### 42'.\n\n{prompt}"
      - name: generate

    scorers:
      - name: pattern
        args:
          pattern: '####\s*(.+)'

